<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rongmei Translator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">

<div class="container py-5">
  <div class="card shadow-lg border-0">
    <div class="card-body bg-secondary text-white rounded">

      <h1 class="text-center mb-4">English ➜ Rongmei Translator</h1>

      <div class="mb-3">
        <label class="form-label">Enter English Text</label>
        <textarea id="inputText" class="form-control" rows="4" placeholder="Type here..."></textarea>
      </div>

      <div class="d-grid gap-2">
        <button class="btn btn-warning btn-lg" onclick="translateText()">Translate</button>
      </div>

      <hr>

      <div class="mb-3">
        <label class="form-label">Rongmei Translation</label>
        <textarea id="outputText" class="form-control" rows="4" readonly></textarea>
      </div>

      <div class="text-center">
        <button class="btn btn-outline-light" onclick="clearText()">Clear</button>
      </div>

    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
